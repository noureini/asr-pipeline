# =============================================================================
# ASR Pipeline Configuration
# =============================================================================
# This file defines all configurable parameters for the multilingual ASR
# pipeline. Override any value via CLI flags or environment variables
# prefixed with ASR_PIPELINE_ (e.g., ASR_PIPELINE_DEVICE=cpu).
# =============================================================================

# ---------------------------------------------------------------------------
# Pipeline-level settings
# ---------------------------------------------------------------------------
pipeline:
  device: "cuda"                    # "cuda" or "cpu"
  compute_type: "int8_float16"       # "int8_float16" (GPU), "float16", "int8" (CPU), "float32"
  batch_size: 8                     # Batch size for ASR inference
  num_workers: 4                    # DataLoader workers for preprocessing
  output_dir: "./outputs"           # Default output directory
  low_vram: false                   # Sequential mode: one model at a time (~3 GB peak VRAM)

# ---------------------------------------------------------------------------
# Audio preprocessing
# ---------------------------------------------------------------------------
preprocessing:
  target_sample_rate: 16000         # All models expect 16kHz
  mono: true                        # Convert to mono
  loudness_normalization:
    enabled: true
    target_lufs: -23.0              # EBU R128 standard
  vad:
    enabled: true
    threshold: 0.5                  # Silero VAD speech probability threshold
    min_speech_duration_ms: 250     # Minimum speech segment duration
    min_silence_duration_ms: 100    # Minimum silence between speech segments
  chunking:
    max_duration_s: 30              # Maximum chunk duration in seconds
    overlap_s: 2                    # Overlap between chunks for continuity
  noise_reduction:
    enabled: true
    method: "spectral_gating"       # "spectral_gating" or "none"
    prop_decrease: 0.75             # Noise reduction strength (0.0-1.0)

# ---------------------------------------------------------------------------
# Language registry
# ---------------------------------------------------------------------------
# Two tiers only:
#   - high: Routed to Whisper (reliable, high-resource languages)
#   - non_high: Routed to Omnilingual ASR (everything else)
