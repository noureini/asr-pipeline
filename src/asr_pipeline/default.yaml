# ---------------------------------------------------------------------------
# ASR engines
# ---------------------------------------------------------------------------
whisper:
  model_size: "large-v3"            # Whisper model variant
  beam_size: 5                      # Beam search width
  best_of: 5                        # Number of candidates
  patience: 1.0                     # Beam search patience
  condition_on_previous_text: true  # Use previous text as context
  vad_filter: true                  # Apply VAD filter within Whisper
  word_timestamps: true             # Enable word-level timestamps
  batch_inference: true             # Use BatchedInferencePipeline for faster GPU transcription
  batch_size: 8                     # Number of chunks processed in parallel (lower if OOM)

omnilingual:
  model_card: "omniASR_CTC_300M_v2"     # Default: fits 16GB GPU
  # model_card: "omniASR_CTC_1B_v2"     # Better accuracy, needs 24GB
  # model_card: "omniASR_LLM_300M_v2"   # LLM variant for zero-shot
  zero_shot_model_card: "omniASR_LLM_300M_v2"  # For zero-shot new languages
  max_audio_length_s: 40            # Omnilingual limit per chunk

# ---------------------------------------------------------------------------
# Speaker diarization
# ---------------------------------------------------------------------------
diarization:
  backend: "pyannote"               # "pyannote" or "nemo_msdd"
  model: "pyannote/speaker-diarization-3.1"  # Only for pyannote backend
  auth_token: null                  # HuggingFace token (required for pyannote)
  min_speakers: null                # null = auto-detect
  max_speakers: null                # null = auto-detect
  min_segment_duration: 0.5         # Minimum segment duration in seconds
  nemo:                             # Only used when backend: "nemo_msdd"
    use_msdd: false                 # true = NeuralDiarizer (slower, overlap-aware)
    speaker_embeddings_model: "titanet_large"
    clustering_method: "agglomerative"
    max_rp_threshold: 0.25          # Clustering distance threshold
    sparse_search_volume: 30

# ---------------------------------------------------------------------------
# Forced alignment (wav2vec2 MMS)
# ---------------------------------------------------------------------------
alignment:
  enabled: true                     # Refine word timestamps via MMS forced alignment

# ---------------------------------------------------------------------------
# Post-processing
# ---------------------------------------------------------------------------
postprocessing:
  translation_backend: "translategemma"  # "translategemma" (default) or "ct2_nllb" (legacy)

  # TranslateGemma 4B — single model for translation + English cleanup
  # Auto-downloads from HuggingFace on first run (~3 GB).
  # Handles all languages (55 supported) including English→English cleanup.
  translategemma:
    model_id: "google/translategemma-4b-it"
    batch_size: 8                   # GPU batch size for HF pipeline
    max_new_tokens: 256             # Max tokens per translated segment
    quantize: "4bit"                # "4bit", "8bit", or null (full precision). Requires bitsandbytes.

  # ── Below configs only used with translation_backend: "ct2_nllb" ──

  # Ollama LLM for joint refinement (ct2_nllb backend only)
  correction:
    enabled: true
    model: "qwen2.5:1.5b"
    base_url: "http://localhost:11434"
    temperature: 0.1
    max_tokens: 2048
    conservative_for_non_high: true

  # CTranslate2 NLLB translation (ct2_nllb backend, or fallback for unsupported langs)
  translation:
    enabled: false                  # Disabled by default (TranslateGemma handles translation)
    model_path: null                # Set via: asr-pipeline setup --translation-backend ct2_nllb
    tokenizer_name: "facebook/nllb-200-distilled-1.3B"
    target_language: "eng_Latn"
    max_length: 512
    beam_size: 4

  # Joint refinement (ct2_nllb backend only)
  refinement:
    enabled: true
    temperature: 0.2
    max_tokens: 2048

# ---------------------------------------------------------------------------
# Output formatting
# ---------------------------------------------------------------------------
output:
  format: "txt"                     # "txt", "json", "srt", or "all"
  transcription_style: "intelligent_verbatim"  # "verbatim" or "intelligent_verbatim"
  include_raw_text: true            # Include pre-correction text
  include_translation: true         # Include English translation
  timestamp_format: "HH:MM:SS"     # "HH:MM:SS" or "HH:MM:SS.mmm"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"                     # DEBUG, INFO, WARNING, ERROR
  file: null                        # null = stdout only; path = also log to file
  format: "rich"                    # "rich" (console) or "plain" (file-friendly)
  show_progress: true               # Show progress bars
